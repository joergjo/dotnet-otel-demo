name: dotnet-otel-demo

services:

  dice-roller:
    profiles:
      - all
    image: ${DICE_ROLLER_IMAGE:-joergjo/dice-roller:latest}
    build: ./DiceRoller
    ports:
      - "8080:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4317
    depends_on:
      collector:
        condition: service_started
    restart: unless-stopped

  collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/conf/collector-config.yaml"]
    ports:
      - "4317:4317"
    volumes:
      - ./config/collector.yaml:/conf/collector-config.yaml:ro
    restart: unless-stopped
