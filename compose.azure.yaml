services:
  collector:
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - TENANT_ID=${TENANT_ID}
      - TRACES_ENDPOINT=${TRACES_ENDPOINT}
      - LOGS_ENDPOINT=${LOGS_ENDPOINT}
      - METRICS_ENDPOINT=${METRICS_ENDPOINT}
    volumes:
      - ./config/collector.azure.yaml:/conf/collector-config.yaml:ro